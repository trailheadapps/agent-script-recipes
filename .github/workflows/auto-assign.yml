name: Issue assignment

on:
    issues:
        types: [opened]

jobs:
    auto-assign:
        runs-on: trailheadapps-Ubuntu
        permissions:
            issues: write
        steps:
            - name: 'Auto-assign issue'
              uses: pozil/auto-assign-issue@v2
              with:
                  repo-token: ${{ secrets.BOT_ACCESS_TOKEN }}
                  teams: maintainers-agent-script-recipes
                  numOfAssignee: 1
