<template>
    <lightning-card
        title="Case Submitted Successfully"
        icon-name="standard:case"
    >
        <div class="slds-var-p-horizontal_medium slds-var-p-bottom_medium">
            <div class="slds-box slds-theme_success slds-var-m-bottom_medium">
                <p class="slds-text-heading_small">
                    Your case has been created with number:
                    <strong>{caseNumber}</strong>
                </p>
            </div>

            <div class="slds-grid slds-wrap slds-gutters_small">
                <div class="slds-col slds-size_1-of-2 slds-var-m-bottom_small">
                    <p class="slds-text-title_caps slds-var-m-bottom_xx-small">
                        Subject
                    </p>
                    <p>{subject}</p>
                </div>

                <div class="slds-col slds-size_1-of-2 slds-var-m-bottom_small">
                    <p class="slds-text-title_caps slds-var-m-bottom_xx-small">
                        Status
                    </p>
                    <p>{status}</p>
                </div>

                <div class="slds-col slds-size_1-of-2 slds-var-m-bottom_small">
                    <p class="slds-text-title_caps slds-var-m-bottom_xx-small">
                        Priority
                    </p>
                    <lightning-badge
                        label={priority}
                        class={priorityClass}
                    ></lightning-badge>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-var-m-bottom_small">
                    <p class="slds-text-title_caps slds-var-m-bottom_xx-small">
                        Description
                    </p>
                    <p>{description}</p>
                </div>

                <div class="slds-col slds-size_1-of-2 slds-var-m-bottom_small">
                    <p class="slds-text-title_caps slds-var-m-bottom_xx-small">
                        Created Date
                    </p>
                    <p>{createdDate}</p>
                </div>

                <div class="slds-col slds-size_1-of-2 slds-var-m-bottom_small">
                    <p class="slds-text-title_caps slds-var-m-bottom_xx-small">
                        Estimated Response
                    </p>
                    <p>{estimatedResponse}</p>
                </div>
            </div>
        </div>
    </lightning-card>
</template>
